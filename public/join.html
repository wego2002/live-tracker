<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LiveTracker - Standort teilen</title>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/join.css">

</head>

<body>

<div class="background"></div>

<div class="join-container">

    <div class="join-card">


        <div class="location-icon">
            📍
        </div>


        <h1>
            Standort teilen
        </h1>


        <p class="description">

            Erlaube deinen Standort,
            damit der Admin dich live auf
            der Karte sehen kann.

        </p>



        <div class="input-group">

            <label>
                Dein Name
            </label>

            <input 
                id="name"
                type="text"
                placeholder="z.B. Max"
                autocomplete="off"
            >

        </div>



        <button id="startButton">

            📡 Standort freigeben

        </button>



        <div id="status" class="status">

            ⚪ Nicht verbunden

        </div>



        <div class="info">

            🔒 Deine Zustimmung ist erforderlich.<br>
            Du kannst die Freigabe jederzeit beenden.

        </div>


    </div>


</div>



<script src="/socket.io/socket.io.js"></script>
<script src="js/common.js"></script>
<script src="js/join.js"></script>


</body>

</html>
